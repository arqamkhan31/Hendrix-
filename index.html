<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hendrix Trading</title>

<style>
:root {
  --bg: #0b0f1a;
  --card: #121826;
  --text: #ffffff;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
}

/* LOGIN */
.login {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.login button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  background: #00c896;
  color: white;
  font-size: 16px;
}

/* APP */
.app {
  display: none;
  height: 100vh;
  flex-direction: column;
}

/* SECTIONS */
.section {
  display: none;
  flex: 1;
  overflow: auto;
}

.active {
  display: block;
}

/* SYMBOL LIST */
.symbol {
  padding: 15px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  font-size: 16px;
}

/* CHART */
.chart {
  height: 100%;
  background: black;
}

/* NAVBAR */
.navbar {
  height: 60px;
  display: flex;
  background: var(--card);
}

.navbar button {
  flex: 1;
  border: none;
  background: none;
  color: var(--text);
  font-size: 14px;
}

.navbar button:hover {
  background: #1c2333;
}

/* SETTINGS */
.settings-btn {
  display: block;
  margin: 15px;
  padding: 10px;
  border-radius: 6px;
  border: none;
  width: 90%;
}

/* LOGOUT */
.logout {
  background: red;
  color: white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h1>Hendrix</h1>
  <button onclick="enterApp()">Continue as Guest</button>
  <button onclick="enterApp()">Login</button>
</div>

<!-- APP -->
<div class="app" id="app">

  <!-- SYMBOLS -->
  <div class="section" id="symbols">
    <div class="symbol">EURUSD <span id="eur">1.0845</span></div>
    <div class="symbol">BTCUSD <span id="btc">64000</span></div>
    <div class="symbol">XAUUSD <span id="gold">2300</span></div>
  </div>

  <!-- CHART -->
  <div class="section active" id="chart">
    <div class="chart" id="tvchart"></div>
  </div>

  <!-- HISTORY -->
  <div class="section" id="history">
    <h2 style="padding:20px;">Trade History</h2>
  </div>

  <!-- SETTINGS -->
  <div class="section" id="settings">
    <h2 style="padding:20px;">Settings</h2>

    <button class="settings-btn" onclick="setTheme('dark')">Dark Theme</button>
    <button class="settings-btn" onclick="setTheme('blue')">Blue Theme</button>
    <button class="settings-btn" onclick="setTheme('white')">White Theme</button>

    <button class="settings-btn logout" onclick="logout()">Logout</button>
  </div>

  <!-- NAVBAR -->
  <div class="navbar">
    <button onclick="show('symbols')">Symbols</button>
    <button onclick="show('chart')">Chart</button>
    <button onclick="show('history')">History</button>
    <button onclick="show('settings')">Settings</button>
  </div>

</div>

<!-- TradingView Chart -->
<script src="https://s3.tradingview.com/tv.js"></script>

<script>
function enterApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "flex";
  show('chart');

  // Load chart
  new TradingView.widget({
    container_id: "tvchart",
    symbol: "FX:EURUSD",
    interval: "1",
    theme: "dark",
    style: "1",
    width: "100%",
    height: "100%"
  });

  startPrices();
}

function show(sectionId) {
  document.querySelectorAll(".section").forEach(sec => {
    sec.classList.remove("active");
  });
  document.getElementById(sectionId).classList.add("active");
}

/* LIVE PRICE SIMULATION */
function startPrices() {
  setInterval(() => {
    update("eur", 1.08, 1.09);
    update("btc", 63000, 65000);
    update("gold", 2280, 2320);
  }, 1000);
}

function update(id, min, max) {
  let val = (Math.random() * (max - min) + min).toFixed(4);
  document.getElementById(id).innerText = val;
}

/* THEMES */
function setTheme(type) {
  if(type === "dark") {
    document.documentElement.style.setProperty('--bg', '#0b0f1a');
    document.documentElement.style.setProperty('--card', '#121826');
    document.documentElement.style.setProperty('--text', '#ffffff');
  }
  if(type === "blue") {
    document.documentElement.style.setProperty('--bg', '#0a1f3a');
    document.documentElement.style.setProperty('--card', '#123a6b');
    document.documentElement.style.setProperty('--text', '#ffffff');
  }
  if(type === "white") {
    document.documentElement.style.setProperty('--bg', '#f2f2f2');
    document.documentElement.style.setProperty('--card', '#ffffff');
    document.documentElement.style.setProperty('--text', '#000000');
  }
}

/* LOGOUT */
function logout() {
  document.getElementById("app").style.display = "none";
  document.getElementById("login").style.display = "flex";
}
</script>

</body>
</html>
