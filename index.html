<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hendrix Trading</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

/* LOGIN */
.login {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.login button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  background: #00c896;
  color: white;
  font-size: 16px;
}

/* APP */
.app {
  display: none;
  height: 100vh;
  flex-direction: column;
}

/* SECTIONS */
.section {
  display: none;
  flex: 1;
  overflow: auto;
}

.active {
  display: block;
}

/* SYMBOLS */
.symbol {
  padding: 15px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
}

/* CHART */
.chart {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
}

/* NAVBAR */
.navbar {
  height: 60px;
  display: flex;
  background: #121826;
}

.navbar button {
  flex: 1;
  border: none;
  background: none;
  color: white;
  font-size: 14px;
}

.navbar button:hover {
  background: #1c2333;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h1>Hendrix</h1>
  <button onclick="enterApp()">Continue as Guest</button>
  <button onclick="enterApp()">Login</button>
</div>

<!-- APP -->
<div class="app" id="app">

  <!-- SYMBOL SECTION -->
  <div class="section" id="symbols">
    <div class="symbol">EURUSD <span>1.0845</span></div>
    <div class="symbol">BTCUSD <span>64000</span></div>
    <div class="symbol">XAUUSD <span>2300</span></div>
  </div>

  <!-- CHART SECTION -->
  <div class="section active" id="chart">
    <div class="chart">
      <h2>Candle Chart (Full Screen)</h2>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="section" id="history">
    <h2 style="padding:20px;">Trade History</h2>
  </div>

  <!-- SETTINGS -->
  <div class="section" id="settings">
    <h2 style="padding:20px;">Settings / Tools</h2>
  </div>

  <!-- NAVBAR -->
  <div class="navbar">
    <button onclick="show('symbols')">Symbols</button>
    <button onclick="show('chart')">Chart</button>
    <button onclick="show('history')">History</button>
    <button onclick="show('settings')">Settings</button>
  </div>

</div>

<script>
function enterApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "flex";

  // default open chart
  show('chart');
}

function show(sectionId) {
  let sections = document.querySelectorAll(".section");
  sections.forEach(sec => sec.classList.remove("active"));

  document.getElementById(sectionId).classList.add("active");
}
</script>

</body>
</html>
