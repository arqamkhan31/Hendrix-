<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hendrix Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://s3.tradingview.com/tv.js"></script><style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0b0f1a;
  color: #fff;
}

.header {
  display: flex;
  justify-content: space-between;
  padding: 10px 15px;
  background: #121826;
  border-bottom: 1px solid #1f2a3a;
}

.container {
  display: grid;
  grid-template-columns: 25% 50% 25%;
  height: calc(100vh - 50px);
}

.section {
  padding: 10px;
  overflow-y: auto;
}

.symbol {
  padding: 10px;
  margin-bottom: 5px;
  background: #121826;
  border-radius: 10px;
  cursor: pointer;
}

.symbol:hover {
  background: #1a2235;
}

.trade-panel input {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1a2235;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  margin-bottom: 10px;
  font-weight: bold;
  cursor: pointer;
}

.buy { background: #00c853; }
.sell { background: #d50000; }

.history {
  font-size: 14px;
}

</style></head>
<body><div class="header">
  <div>Hendrix Pro</div>
  <div>Balance: ₹<span id="balance">10000</span></div>
</div><div class="container">  <!-- SYMBOL LIST -->  <div class="section">
    <div class="symbol" onclick="loadChart('BINANCE:BTCUSDT')">BTC/USDT</div>
    <div class="symbol" onclick="loadChart('BINANCE:ETHUSDT')">ETH/USDT</div>
    <div class="symbol" onclick="loadChart('FX:EURUSD')">EUR/USD</div>
  </div>  <!-- CHART -->  <div class="section">
    <div id="chart" style="height:100%"></div>
  </div>  <!-- TRADE PANEL -->  <div class="section trade-panel">
    <input type="number" id="lot" placeholder="Lot Size">
    <input type="number" id="sl" placeholder="Stop Loss">
    <input type="number" id="tp" placeholder="Take Profit"><button class="buy" onclick="trade('BUY')">BUY</button>
<button class="sell" onclick="trade('SELL')">SELL</button>

<h3>History</h3>
<div id="history" class="history"></div>

  </div></div><script>
let balance = 10000;
let currentSymbol = 'BINANCE:BTCUSDT';

function loadChart(symbol) {
  currentSymbol = symbol;
  document.getElementById('chart').innerHTML = '';
  new TradingView.widget({
    container_id: "chart",
    width: "100%",
    height: "100%",
    symbol: symbol,
    interval: "1",
    theme: "dark",
    style: "1"
  });
}

loadChart(currentSymbol);

function trade(type) {
  let lot = document.getElementById('lot').value;
  let history = document.getElementById('history');

  if (!lot) return alert('Enter lot size');

  let profit = (Math.random() * 200 - 100).toFixed(2);
  balance += parseFloat(profit);

  document.getElementById('balance').innerText = balance.toFixed(2);

  history.innerHTML += `<div>${type} ${currentSymbol} | P/L: ₹${profit}</div>`;
}
</script></body>
  </html>
