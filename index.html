<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hendrix Trading</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

/* LOGIN */
.login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.login button {
  width: 220px;
  padding: 12px;
  margin: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.guest {
  background: #00c853;
}

.google {
  background: #4285F4;
}

/* APP */
.app {
  display: none;
  height: 100vh;
}

/* MAIN LAYOUT */
.main {
  display: flex;
  height: 100%;
}

/* LEFT SYMBOL LIST */
.symbols {
  width: 30%;
  background: #111827;
  overflow-y: auto;
  border-right: 1px solid #222;
}

.symbol {
  padding: 15px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
}

.symbol:hover {
  background: #1f2937;
  cursor: pointer;
}

/* RIGHT CHART */
.chart-section {
  width: 70%;
  display: flex;
  flex-direction: column;
}

/* CHART */
#chart {
  height: 70%;
}

/* TRADE PANEL */
.trade {
  height: 30%;
  background: #111827;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.inputs {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.inputs input {
  flex: 1;
  padding: 10px;
  background: #1f2937;
  border: none;
  color: white;
}

/* BUTTONS */
.buttons {
  display: flex;
  justify-content: space-between;
}

.buy {
  background: #00c853;
  padding: 15px;
  width: 48%;
  border: none;
}

.sell {
  background: #d50000;
  padding: 15px;
  width: 48%;
  border: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h1>Hendrix</h1>

  <!-- Guest TOP -->
  <button class="guest" onclick="enterApp()">Continue as Guest</button>

  <!-- Google BOTTOM -->
  <button class="google">Login with Google</button>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="main">

    <!-- SYMBOL LIST -->
    <div class="symbols" id="symbols">
      <div class="symbol" onclick="loadChart('FX:EURUSD')">
        <span>EURUSD</span>
        <span id="p1">1.08</span>
      </div>
      <div class="symbol" onclick="loadChart('FX:GBPUSD')">
        <span>GBPUSD</span>
        <span id="p2">1.26</span>
      </div>
      <div class="symbol" onclick="loadChart('FX:USDJPY')">
        <span>USDJPY</span>
        <span id="p3">151.2</span>
      </div>
      <div class="symbol" onclick="loadChart('BINANCE:BTCUSDT')">
        <span>BTCUSD</span>
        <span id="p4">65000</span>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="chart-section">

      <!-- CHART -->
      <div id="chart"></div>

      <!-- TRADE PANEL -->
      <div class="trade">

        <div class="inputs">
          <input type="number" placeholder="Lot Size">
          <input type="number" placeholder="Stop Loss">
          <input type="number" placeholder="Take Profit">
        </div>

        <div class="buttons">
          <button class="sell">SELL</button>
          <button class="buy">BUY</button>
        </div>

      </div>

    </div>

  </div>

</div>

<script>
function enterApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadChart("FX:EURUSD");
}

/* LOAD CHART */
function loadChart(symbol) {
  document.getElementById("chart").innerHTML = "";

  new TradingView.widget({
    "width": "100%",
    "height": "100%",
    "symbol": symbol,
    "interval": "15",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1", // candlestick
    "container_id": "chart"
  });
}

/* FAKE LIVE PRICE UPDATE */
setInterval(() => {
  document.getElementById("p1").innerText = (1.07 + Math.random()/100).toFixed(5);
  document.getElementById("p2").innerText = (1.25 + Math.random()/100).toFixed(5);
  document.getElementById("p3").innerText = (151 + Math.random()).toFixed(3);
  document.getElementById("p4").innerText = (65000 + Math.random()*1000).toFixed(0);
}, 1000);
</script>

</body>
</html>
